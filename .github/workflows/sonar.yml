name: SonarQube Scan (Source-only)

on:
  push:
    branches: [ main ]

jobs:
  sonar-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download SonarScanner CLI
        run: |
          SCANNER_VERSION="4.8.0.2856"
          curl -sSLo scanner.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip"
          unzip scanner.zip
          echo "${{ github.workspace }}/sonar-scanner-${SCANNER_VERSION}-linux/bin" >> $GITHUB_PATH

      - name: Run SonarScanner (source-only)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN" \
            -Dsonar.projectKey=com-example-sonar-maven-demo \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java
