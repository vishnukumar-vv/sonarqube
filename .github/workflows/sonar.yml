name: CI + Sonar + Artifactory

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Build + Test
      - name: Build and Test
        run: mvn clean verify

      # 4. SonarCloud Scan
      - name: SonarCloud Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=vishnukumar-vv_sonarqube \
            -Dsonar.organization=vishnukumar-vv \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 5. Install JFrog CLI
      - name: Install JFrog CLI
        run: curl -fL https://install-cli.jfrog.io | sh

      # 6. Configure Artifactory
      - name: Configure JFrog Artifactory
        run: |
          ./jfrog config add artifactory-server \
          --url=${{ secrets.JFROG_URL }}/artifactory \
          --user=${{ secrets.JFROG_USER }} \
          --password=${{ secrets.JFROG_PASSWORD }} \
          --interactive=false

      # 7. Upload Artifact to Artifactory
      - name: Upload JAR
        run: |
          ./jfrog rt u "target/*.jar" libs-release-local/

      # 8. (Optional) Versioned Upload - better practice
      - name: Upload with Version
        run: |
          VERSION=$(date +%Y%m%d%H%M)
          ./jfrog rt u "target/*.jar" libs-release-local/myapp-$VERSION.jar
