name: CI + Sonar + Artifactory

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Build + Test
      - name: Build and Test
        run: mvn clean verify

      # 4. SonarCloud Scan
      - name: SonarCloud Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=vishnukumar-vv_sonarqube \
            -Dsonar.organization=vishnukumar-vv \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 5. Install JFrog CLI
      - name: Install JFrog CLI
        run: curl -fL https://install-cli.jfrog.io | sh

      # 6. Verify CLI
      - name: Verify JFrog CLI
        run: jf --version

      # 7. Configure Artifactory (FINAL FIX)
      - name: Configure JFrog
        run: |
          jf config add artifactory-server \
            --url=${{ secrets.JFROG_URL }} \
            --user=${{ secrets.JFROG_USER }} \
            --password=${{ secrets.JFROG_PASSWORD }} \
            --enc-password=false \
            --basic-auth-only=true \
            --interactive=false

      # 8. Test Connection
      - name: Test Artifactory Connection
        run: jf rt ping

      # 9. Upload Artifact
      - name: Upload JAR to Artifactory
        run: jf rt u "target/*.jar" libs-release-local/

      # 10. Upload Versioned Artifact (Best Practice)
      - name: Upload Versioned Artifact
        run: |
          VERSION=$(date +%Y%m%d%H%M)
          jf rt u "target/*.jar" libs-release-local/myapp-$VERSION.jar
